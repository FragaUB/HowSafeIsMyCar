<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!--<link rel="stylesheet" href="/src/styles/index.css">
    <link rel="stylesheet" href="/src/styles/fonts.css">-->
    <link rel="stylesheet" href="/styles/index.css">
    <link rel="stylesheet" href="/styles/fonts.css">
    <link rel="shortcut icon" href="/img/logo.jpg" type="image/x-icon">
    <title>HowSafeIsMyCar?</title>
</head>
<body>
    <!--encabezado-->
    <header class="barra">
        <div class="texto-barra">
            <div><img class="logo encabezado--item" src="img/logo.jpg" alt="HowSafeIsMyCar?"></div>
            <div><h2 class="titulo_principal encabezado--item">
                <span class="mitad_uno">Is My</span><span class="mitad_dos">Car Safe</span><span class="mitad_tres">?</span>
            </h2></div>
            <div><h2 class="descripcion_barra encabezado--item">
                Calificaciones basadas en las<br>pruebas de seguridad de la:
            </h2></div>
            <div><h2 class="NHTSA encabezado--item">NHTSA</h2></div>
        </div>
    </header>
    <main> 
        <!--listas-->
        <div class="listas">
            <fieldset class="lista_año">
                <legend class="año_texto">AÑO</legend>
                <select class="año" name="year" id="year">
                    <option value="">Seleccione un año</option>
                </select>
            </fieldset>
            <fieldset class="lista_marca">
                <legend class="marca">MARCA</legend>
                <select class="marca_auto" name="maker" id="marca_auto">
                    <option value="">Seleccione una marca</option>
                </select>
            </fieldset>

            <fieldset class="lista_modelo">
                <legend class="modelo_texto">MODELO</legend>
                <select class="modelo_auto" name="model" id="modelo_auto">
                    <option value="">Seleccione un modelo</option>
                </select>
            </fieldset>

            <fieldset class="lista_version">
                <legend class="VERSION_texto">VERSION</legend>
                <select class="version_auto" name="version" id="version_auto">
                    <option value="">Seleccione una versión</option>
                </select>
            </fieldset>
        </div>
        <hr>
        <!--resultados de la api-->
        <div id="Resultados" class="info_autos">
            <article>
                <!--imagenes-->
                <img id="img_frontal" src="" alt="iamgen_1" class="choque_frontal">
                <hr>
                <img id="img_lateral" src="" alt="imagen_2" class="choque_lateral">
                <hr>
                <img id="img_poste" src="" alt="imagen_3" class="choque_poste">
                <hr>
                <!--rating imagen 1-->
                <div class="estrellas_frente">
                    <span id="raiting-frente" class="frente">frente</span>
                    <div id="rating_frente" class="frente_contenedor"></div>
                    <hr>
                    <span id="raiting-conductor" class="conductor">conductor</span>
                    <div id="rating_conductor" class="conductor_contenedor"></div>
                    <hr>
                    <span id="raiting-pasajero" class="pasajero">pasajero</span>
                    <div id="rating_pasajero" class="pasajero_contenedor"></div>
                </div>
                <hr>
                <!--rating imagen 2-->
                <div class="estrellas_lateral">
                    <span id="raiting-lateral" class="lateral">lateral</span>
                    <div id="rating_lateral" class="lateral_contenedor"></div>
                    <hr>
                    <span id="raiting-conductor-lateral" class="conductor_lateral">conductor</span>
                    <div id="rating_conductor_lateral" class="conductor_lateral_contenedor"></div>
                    <hr>
                    <span id="raiting-pasajero-lateral" class="pasajero_lateral">pasajero</span>
                    <div id="rating_pasajero_lateral" class="pasajero_lateral_contenedor"></div>
                </div>
                <hr>
                <!--rating imagen 3-->
                <div class="estrellas_poste">
                    <span id="raiting-poste" class="poste">c/poste</span>
                    <div id="rating_poste" class="poste_contenedor"></div>
                    <hr>
                    <span id="raiting-vuelco" class="vuelco">riesgo de vuelco</span>
                    <div id="rating_vuelco" class="vuelco_contenedor"></div>
                    <hr>
                    <span id="raiting-probabilidad" class="probabilidad">probabilidad</span>
                    <div id="rating_probabilidad" class="probabilidad_contenedor"></div>
                </div>
                <hr>
            </article>
        </div>
    </main>
    <hr>
    <span>Resultados JSON de la petición completa</span>
    <span id="resultados"></span>
    <script src="api/script.js"></script>
</body>
</html>
