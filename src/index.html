<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/styles/index.css">
    <title>HowSafeIsMyCar</title>
</head>
<body>
    <!--encabezado-->
    <header class="barra">
        <img src="img/logo.jpg" alt="logo" width="75" height="61" class="logo">
        <div clas="texto-barra">
            <h1 class="titulo_principal">
                <span class="mitad_uno">is My</span><span class="mitad_dos"> Car Safe</span><span class="fin_titulo">?</span>
            </h1>
            <h2 class="descripccion_barra">
                calificaciones basadas en las<br>pruebas de seguridad de la
            </h2>
            <h1 class="NHTSA">NHTSA</h1>
        </div>
    </header>
    <main> 
        <!--listas-->
        <div class="listas">
            <select class="año" name="year" id="year">
                <option value="">Seleccione un año</option>
            </select>
            <select class="marca_auto" name="maker" id="marca_auto">
                <option value="">Seleccione una marca</option>
            </select>
            <select class="modelo_auto" name="model" id="modelo_auto">
                <option value="">Seleccione un modelo</option>
            </select>
            <select class="version_auto" name="version" id="version_auto">
                <option value="">Seleccione una versión</option>
            </select>
        </div>
        <!--resultados de la api-->
        <div id="Resultados" class="info_autos">
            <article>
                <!--imagenes-->
                <img src="" alt="iamgen_1" class="choque_frontal"><img src="" alt="imagen_2" class="choque_lateral"><img src="" alt="imagen_3" class="choque_poste">
                <!--rating imagen 1-->
                <div class="estrellas_frente">
                    <span class="frente">frente</span>
                    <div id="rating_frente" class="frente_contenedor"></div>

                    <span class="conductor">conductor</span>
                    <div id="rating_conductor" class="conductor_contenedor"></div>

                    <span class="pasajero">pasajero</span>
                    <div id="rating_pasajero" class="pasajero_contenedor"></div>
                </div>
                <!--rating imagen 2-->
                <div class="estrellas_lateral">
                    <span class="lateral">lateral</span>
                    <div id="rating_lateral" class="lateral_contenedor"></div>

                    <span class="conductor_lateral">conductor</span>
                    <div id="rating_conductor_lateral" class="conductor_lateral_contenedor"></div>

                    <span class="pasajero_lateral">pasajero</span>
                    <div id="rating_pasajero_laterak" class="pasajero_lateral_contenedor"></div>
                </div>
                <!--rating imagen 3-->
                <div class="estrellas_poste">
                    <span class="poste">c/poste</span>
                    <div id="rating_poste" class="poste_contenedor"></div>

                    <span class="vuelco">riesgo de vuelco</span>
                    <div id="rating_vuelco" class="vuelco_contenedor"></div>

                    <span class="probabilidad">probabilidad</span>
                    <div id="rating_probabilidad" class="probabilidad_contenedor"></div>
                </div>
            </article>
        </div>

    </main>
    <span>Resultados JSON de la petición completa</span>
    <span id="resultados"></span>
    <script src="/src/api/script.js"></script>
</body>
</html>
